<!doctype html>
<html>
  <head>
  	<title>Add post</title>
  	<link href="/static/styles.css" rel="stylesheet" type="text/css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
  </head>
  <body>
    
		<header>
      <h1>Add post</h1>
      <nav>
        <a href="/">Posts</a>
        <a href="/authors">Authors</a>
      </nav>
    </header>
  
		<main>
      <form method="POST" action="/new_post">

        <label for="post_title">Title</label>
        <input
          type="text"
          id="post_title"
          name="post_title"
          placeholder="Type here..."
          required
        >
        
        <label for="post_author">Author</label>
        <input
          type="text"
          id="post_author"
          name="post_author"
          placeholder="Type here..."
          required
        >
  
        <label for="post_content">Content</label>
        <textarea
          id="post_content"
          name="post_content"
          placeholder="Type here..."
          rows="6"
          required
        ></textarea>
        
        <button>Submit</button>
				
      </form>
    </main>
  
    <footer>
      <a href="/new_post">+ Add new post</a>
      <a href="/new_author">+ Add new author</a>
    </footer>
		
  </body>
</html>
