<!doctype html>
<html>
  <head>
  	<title>Blog</title>
  	<link href="/static/styles.css" rel="stylesheet" type="text/css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
  </head>
  <body>
    
    <header>
      <h1>Blog</h1>
      <nav>
        <a href="/">Posts</a>
        <a href="/authors">Authors</a>
      </nav>
    </header>
  
    <main>
      <section class="posts">
        {% for post in posts %}
          <article class="post">
            <img src="{{ post['picture'] }}">
            <div>
              <h2>{{ post["title"] }}</h2>
              <small>by {{ post["author"] }}</small>
              <p>{{ post["content"] }}</p>
            </div>
          </article>
        {% else %}
          <p>No posts</p>
        {% endfor %}
      </section>
    </main>
  
    <footer>
      <a href="/new_post">+ Add new post</a>
      <a href="/new_author">+ Add new author</a>
    </footer>
    
  </body>
</html>
